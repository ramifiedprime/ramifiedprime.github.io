name: Build LaTeX and Deploy to Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore PDF cache
        uses: actions/cache@v4
        with:
          path: "**/*.pdf"
          key: latex-pdfs-${{ github.sha }}
          restore-keys: |
            latex-pdfs-

      - name: Find changed .tex files
        id: changed
        run: |
          BEFORE="${{ github.event.before }}"
          SOURCES=$(grep -v '^\s*#' .github/tex-sources.txt | grep -v '^\s*$')
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || ! git rev-parse "$BEFORE" >/dev/null 2>&1; then
            FILES="$SOURCES"
          else
            FILES=$(echo "$SOURCES" | while read -r f; do
              git diff --name-only --diff-filter=d "$BEFORE" HEAD -- "$f"
            done)
          fi
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Remove PDFs for deleted .tex files
        run: |
          BEFORE="${{ github.event.before }}"
          if git rev-parse "$BEFORE" >/dev/null 2>&1; then
              grep -v '^\s*#' .github/tex-sources.txt | grep -v '^\s*$' | while read -r f; do
              git diff --name-only --diff-filter=D "$BEFORE" HEAD -- "$f" | while read -r deleted; do
                pdf="${deleted%.tex}.pdf"
                echo "Removing $pdf"
                rm -f "$pdf"
              done
            done
          fi

      - name: Compile changed LaTeX documents
        if: steps.changed.outputs.files != ''
        uses: xu-cheng/latex-action@v3
        with:
          root_file: ${{ steps.changed.outputs.files }}
          work_in_root_file_dir: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4